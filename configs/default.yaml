# Default configuration for adaptive noise schedule diffusion model

# Model settings
model:
  diffusion_model: "runwayml/stable-diffusion-v1-5"
  clip_model: "openai/clip-vit-base-patch32"
  predictor_hidden_dim: 256
  predictor_num_layers: 3
  use_adaptive_schedule: true
  num_inference_steps: 50
  adaptive_inference_steps: 35  # Target reduced steps with adaptive scheduling

# Training settings
training:
  num_epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  warmup_steps: 1000
  mixed_precision: true
  gradient_accumulation_steps: 4

# Optimizer and scheduler
optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 0.00000001

scheduler:
  type: "cosine"
  num_cycles: 0.5
  min_lr: 0.000001

# RLHF settings
rlhf:
  enabled: true
  reward_scale: 0.1
  kl_penalty: 0.02
  preference_margin: 0.5

# Data settings
data:
  dataset_name: "conceptual_captions"
  subset: "unlabeled"
  max_samples_train: 100000
  max_samples_val: 5000
  image_size: 512
  num_workers: 4
  prefetch_factor: 2

# CLIP guidance settings
clip_guidance:
  enabled: true
  guidance_scale: 7.5
  clip_guidance_scale: 150.0
  target_clip_score: 0.28

# Early stopping
early_stopping:
  patience: 10
  min_delta: 0.001
  monitor: "val_clip_score"
  mode: "max"

# Checkpointing
checkpoint:
  save_dir: "checkpoints"
  save_every_n_epochs: 5
  keep_last_n: 3

# Logging
logging:
  log_every_n_steps: 50
  use_mlflow: true
  experiment_name: "adaptive-noise-diffusion"

# Evaluation
evaluation:
  num_samples: 1000
  fid_batch_size: 50
  compute_fid: true
  compute_clip_score: true
  compute_inference_time: true

# Reproducibility
seed: 42
deterministic: true
